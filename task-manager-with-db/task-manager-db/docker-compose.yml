version: "3.9"

services:

  # ── Databases ──────────────────────────────────────────────────
  task-db:
    image: postgres:15-alpine
    container_name: task-db
    environment:
      POSTGRES_USER:     taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB:       taskdb
    volumes:
      - task-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_USER:     useruser
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB:       userdb
    volumes:
      - user-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U useruser -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Services ───────────────────────────────────────────────────
  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@task-db:5432/taskdb
    depends_on:
      task-db:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://useruser:userpass@user-db:5432/userdb
    depends_on:
      user-db:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      TASK_SERVICE_URL: http://task-service:8001
      USER_SERVICE_URL: http://user-service:8002
    depends_on:
      - task-service
      - user-service
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  task-db-data:
  user-db-data:
