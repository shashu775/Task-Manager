apiVersion: apps/v1
kind: StatefulSet
metadata: 
    name: user-db
    namespace: task-manager
spec:
    serviceName: "user-db"  
    replicas: 1
    selector:   
        matchLabels:
            app: user-db
    template:
        metadata:
            labels:
                app: user-db
        spec:
            containers: 
            - name: user-db
              image: postgres:15
              ports:
                - containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: "userdb"
                - name: POSTGRES_USER
                  value: "useruser"
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: user-db-secret
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: user-db-storage
                  mountPath: /var/lib/postgresql/data
              readinessProbe:
                exec:
                  command:
                    - pg_isready
                    - -U
                    - useruser
                initialDelaySeconds: 5
                periodSeconds: 10     
    volumeClaimTemplates:
          - metadata:
              name: user-db-storage
            spec:
                   accessModes: ["ReadWriteOnce"]
                   storageClassName: manual
                   resources:
                        requests:
                           storage: 1G 
---
apiVersion: v1
kind: Service
metadata:
    name: user-db
    namespace: task-manager
spec:
    selector:
        app: user-db
    ports:
        - protocol: TCP
          port: 5432
          targetPort: 5432
    type: ClusterIP
    clusterIP: None
---
apiVersion: v1
kind: Secret
metadata:
  name: user-db-secret
  namespace: task-manager
type: Opaque
stringData:
  POSTGRES_USER:     useruser
  POSTGRES_PASSWORD: userpass
  POSTGRES_DB:       userdb
  DATABASE_URL:      postgresql://useruser:userpass@user-db:5432/userdb
---
