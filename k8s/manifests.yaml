---
# ── Secrets ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: task-db-secret
  namespace: task-manager
type: Opaque
stringData:
  POSTGRES_USER:     taskuser
  POSTGRES_PASSWORD: taskpass
  POSTGRES_DB:       taskdb
  DATABASE_URL:      postgresql://taskuser:taskpass@task-db:5432/taskdb
---
# ── User Service ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: travel2024/user-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: user-db-secret
              key: DATABASE_URL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: task-manager
spec:
  selector:
    app: user-service
  ports:
  - port: 8002
    targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: task-manager
spec:
  replicas: 2
